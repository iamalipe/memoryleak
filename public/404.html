<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MemoryLeak</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks if there is a redirect path and redirects the browser
      // to the new path preserving the query string and hash.
      var pathSegmentsToKeep = 1 // Number of path segments to keep (1 for /memoryleak/)

      var l = window.location
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/_" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
